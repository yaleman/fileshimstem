name: pylint

"on":
  push:
    branches:
      - main
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Running pylint
        run: |
          python --version
          python -m pip install --quiet --no-cache-dir --upgrade uv
          uv sync --group dev --frozen
          uv run ruff check
